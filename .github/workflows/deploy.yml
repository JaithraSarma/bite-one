# Deploy on merge to master (SOW-KH-002 T10, AC 7/9)
# AWS access via GitHub OIDC only - no stored AWS secrets anywhere.
name: deploy
on:
  push:
    branches: [master]

permissions:
  id-token: write   # OIDC token for AssumeRoleWithWebIdentity
  contents: read

concurrency:
  group: deploy-master
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check app exists
        id: app
        run: if [ -d app ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi

      - uses: actions/setup-node@v4
        if: steps.app.outputs.present == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        if: steps.app.outputs.present == 'true'
        working-directory: app
        run: npm ci --legacy-peer-deps

      - name: Build
        if: steps.app.outputs.present == 'true'
        working-directory: app
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        if: steps.app.outputs.present == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::578257747901:role/bite-one-deploy
          aws-region: ap-south-1

      - name: Sync to S3
        if: steps.app.outputs.present == 'true'
        working-directory: app
        run: aws s3 sync dist/ s3://bite-one-spa-578257747901/ --delete

      - name: Invalidate CloudFront
        if: steps.app.outputs.present == 'true'
        run: aws cloudfront create-invalidation --distribution-id E2K8F419SW31FK --paths "/*"
