# Required status check on master (SOW-KH-002 T9, AC 6)
# install deps -> build -> Playwright smoke test; trace uploaded on failure.
name: ci
on:
  pull_request:
    branches: [master]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The app directory arrives in T8; until then CI passes trivially so
      # infra/docs PRs are not blocked by the required check.
      - name: Check app exists
        id: app
        run: if [ -d app ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi

      - uses: actions/setup-node@v4
        if: steps.app.outputs.present == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        if: steps.app.outputs.present == 'true'
        working-directory: app
        run: npm ci --legacy-peer-deps

      - name: Build
        if: steps.app.outputs.present == 'true'
        working-directory: app
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Install Playwright browsers
        if: steps.app.outputs.present == 'true'
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: Smoke test (login page loads, correct title)
        if: steps.app.outputs.present == 'true'
        working-directory: app
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: npx playwright test

      - name: Upload Playwright trace on failure
        if: failure() && steps.app.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: |
            app/test-results/
            app/playwright-report/
          retention-days: 7
