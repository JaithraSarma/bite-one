# Local workstation stack — SOW-KH-002 T1 (LiteLLM) + T2 (Open WebUI)
# All images pinned. Secrets come from .env (gitignored); see .env.example.
services:
  litellm-db:
    image: postgres:16.6-alpine
    container_name: litellm-db
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD}
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.77.3-stable
    container_name: litellm
    depends_on:
      litellm-db:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      DATABASE_URL: postgresql://litellm:${LITELLM_DB_PASSWORD}@litellm-db:5432/litellm
      STORE_MODEL_IN_DB: "True"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 10s
      timeout: 5s
      retries: 12

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.6.26
    container_name: open-webui
    depends_on:
      litellm:
        condition: service_healthy
    ports:
      - "3000:8080"
    environment:
      # Points at LiteLLM using the budgeted "spec" virtual key ($2) — AC 1
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_SPEC_KEY}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      ENABLE_OLLAMA_API: "False"
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  litellm-db-data:
  open-webui-data:
